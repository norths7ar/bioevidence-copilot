name: bioevidence-copilot

services:
  neo4j:
    image: neo4j:2026.06.0
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-bioevidence-local}
      HEALTHCHECK_PASSWORD: ${NEO4J_PASSWORD:-bioevidence-local}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test:
        - CMD-SHELL
        - cypher-shell -u neo4j -p "$${HEALTHCHECK_PASSWORD}" "RETURN 1" >/dev/null
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
    env_file:
      - path: .env
        required: false
    environment:
      DATA_DIR: /app/data/corpora/demo
      EMBEDDING_CACHE_DIR: /tmp/bioevidence-cache
      GRAPH_ENABLED: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-bioevidence-local}
      NEO4J_DATABASE: neo4j
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j-data:
  neo4j-logs:
