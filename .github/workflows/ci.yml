name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.31"
          enable-cache: true

      - name: Check dependency lock
        run: uv lock --check --no-managed-python

      - name: Sync locked dependencies
        run: uv sync --locked --all-extras --no-managed-python

      - name: Run lint
        run: uv run ruff check --no-cache .

      - name: Run focused type check
        run: uv run mypy src/bioevidence/schemas src/bioevidence/evaluation src/bioevidence/workflows src/bioevidence/graph --no-sqlite-cache --no-incremental

      - name: Run tests
        run: uv run pytest

      - name: Run evaluation smoke test
        run: uv run python scripts/run_eval.py --dataset data/evaluations/demo/demo_eval_dataset.jsonl --data-dir data/corpora/demo --mode baseline --limit 1
